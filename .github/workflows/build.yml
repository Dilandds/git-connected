name: Build and Test (macOS & Windows)

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build on macOS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13, macos-14]  # Test on latest 2 macOS versions
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0
    
    - name: Install create-dmg (for DMG creation)
      run: |
        brew install create-dmg
    
    - name: Build application
      run: |
        chmod +x build_mac.sh
        ./build_mac.sh
    
    - name: Verify .app bundle exists
      run: |
        if [ ! -d "dist/ECTOFORM.app" ]; then
          echo "Error: .app bundle not found"
          exit 1
        fi
        echo "✓ .app bundle created successfully"
    
    - name: Verify executable
      run: |
        EXE_PATH="dist/ECTOFORM.app/Contents/MacOS/ECTOFORM"
        if [ ! -f "$EXE_PATH" ]; then
          echo "Error: Executable not found"
          exit 1
        fi
        file "$EXE_PATH"
        echo "✓ Executable verified"
    
    - name: Check app structure
      run: |
        echo "App bundle contents:"
        ls -la "dist/ECTOFORM.app/Contents/"
        echo ""
        echo "Resources:"
        ls -la "dist/ECTOFORM.app/Contents/Resources/" 2>/dev/null || echo "No Resources folder"
        echo ""
        echo "Bundled data files:"
        find "dist/ECTOFORM.app" -name "*.qss" -o -name "splash.png" -o -name "icon.icns" | head -10
    
    - name: Test app launch (headless)
      run: |
        # Try to run the app in headless mode to check for immediate crashes
        # This will fail if there are missing dependencies
        timeout 10 "dist/ECTOFORM.app/Contents/MacOS/ECTOFORM" --version 2>&1 || echo "App launch test completed"
        echo "✓ App executable runs (may exit immediately without GUI)"
    
    - name: Check DMG file
      run: |
        if [ -f "ECTOFORM-1.0.0-macOS.dmg" ]; then
          echo "✓ DMG file created"
          ls -lh "ECTOFORM-1.0.0-macOS.dmg"
        else
          echo "Warning: DMG file not found"
        fi
    
    - name: Upload .app bundle as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ECTOFORM-macOS-${{ matrix.os }}
        path: |
          dist/ECTOFORM.app
        retention-days: 30
    
    - name: Upload DMG as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ECTOFORM-DMG-${{ matrix.os }}
        path: |
          ECTOFORM-1.0.0-macOS.dmg
        retention-days: 30
    
    - name: Build summary
      run: |
        echo "## Build Summary (Commercial)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ App bundle created" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Executable verified" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Build completed on ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY

    # ---- Education Edition ----
    - name: Build Education edition
      run: |
        rm -rf build dist
        chmod +x build_mac_education.sh
        ./build_mac_education.sh

    - name: Verify Education .app bundle exists
      run: |
        if [ ! -d "dist/ECTOFORM-Education.app" ]; then
          echo "Error: Education .app bundle not found"
          exit 1
        fi
        echo "✓ Education .app bundle created successfully"

    - name: Verify Education executable
      run: |
        EXE_PATH="dist/ECTOFORM-Education.app/Contents/MacOS/ECTOFORM-Education"
        if [ ! -f "$EXE_PATH" ]; then
          echo "Error: Education executable not found"
          exit 1
        fi
        file "$EXE_PATH"
        echo "✓ Education executable verified"

    - name: Upload Education .app as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ECTOFORM-Education-macOS-${{ matrix.os }}
        path: dist/ECTOFORM-Education.app
        retention-days: 30

    - name: Upload Education DMG as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ECTOFORM-Education-DMG-${{ matrix.os }}
        path: ECTOFORM-Education-1.0.0-macOS.dmg
        retention-days: 30

    - name: Education build summary
      run: |
        echo "## Build Summary (Education)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Education .app bundle created" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Education executable verified" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Education build completed on ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller>=6.0.0
    
    - name: Build application
      run: |
        powershell -ExecutionPolicy Bypass -File build_windows.ps1
    
    - name: Verify EXE exists
      run: |
        $exePath = "dist\ECTOFORM.exe"
        if (-not (Test-Path $exePath)) {
          Write-Host "Error: EXE not found at $exePath" -ForegroundColor Red
          exit 1
        }
        Write-Host "✓ EXE created successfully: $exePath" -ForegroundColor Green
        $fileInfo = Get-Item $exePath
        Write-Host "  Size: $([math]::Round($fileInfo.Length / 1MB, 2)) MB" -ForegroundColor Cyan
    
    - name: Verify executable
      run: |
        $exePath = "dist\ECTOFORM.exe"
        Get-Item $exePath | Select-Object Name, Length, LastWriteTime
        Write-Host "✓ Executable verified"
    
    - name: Check bundled files
      run: |
        Write-Host "Checking for bundled assets..."
        $exePath = "dist\ECTOFORM.exe"
        if (Test-Path $exePath) {
          Write-Host "✓ EXE file exists"
        }
        Write-Host "Note: PyInstaller bundles files inside the EXE"
    
    - name: Test EXE (basic)
      run: |
        # Try to run EXE with --version or similar (may not work, but tests basic execution)
        $exePath = "dist\ECTOFORM.exe"
        Write-Host "EXE location: $exePath"
        Write-Host "File info:"
        Get-Item $exePath | Format-List
        Write-Host "✓ EXE file verified (GUI apps can't be tested headless)"
    
    - name: Copy launcher .bat files to dist
      run: |
        Copy-Item ECTOFORM_SoftwareOpenGL.bat dist\ -ErrorAction SilentlyContinue
        Copy-Item ECTOFORM_Offscreen.bat dist\ -ErrorAction SilentlyContinue
        Copy-Item ECTOFORM_BothFixes.bat dist\ -ErrorAction SilentlyContinue
        Copy-Item LAUNCHERS_README.txt dist\ -ErrorAction SilentlyContinue
        Get-ChildItem dist\*.bat, dist\*.txt -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  Added $_" }
    
    - name: Create ZIP distribution
      run: |
        $zipPath = "ECTOFORM-Windows.zip"
        if (Test-Path $zipPath) {
          Remove-Item $zipPath -Force
        }
        Compress-Archive -Path "dist\*" -DestinationPath $zipPath -Force
        $zipInfo = Get-Item $zipPath
        Write-Host "✓ Created $zipPath ($([math]::Round($zipInfo.Length / 1MB, 2)) MB)" -ForegroundColor Green
    
    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: ECTOFORM-Windows.zip
        path: ECTOFORM-Windows.zip
        retention-days: 30
    
    - name: Build summary
      run: |
        echo "## Build Summary (Commercial)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ EXE created successfully" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ ZIP distribution created (ECTOFORM-Windows.zip)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Build completed on Windows" >> $GITHUB_STEP_SUMMARY

    # ---- Education Edition ----
    - name: Build Education edition
      run: |
        Remove-Item -Recurse -Force build, dist -ErrorAction SilentlyContinue
        powershell -ExecutionPolicy Bypass -File build_windows_education.ps1

    - name: Verify Education EXE exists
      run: |
        $exePath = "dist\ECTOFORM-Education.exe"
        if (-not (Test-Path $exePath)) {
          Write-Host "Error: Education EXE not found at $exePath" -ForegroundColor Red
          exit 1
        }
        Write-Host "✓ Education EXE created successfully: $exePath" -ForegroundColor Green
        $fileInfo = Get-Item $exePath
        Write-Host "  Size: $([math]::Round($fileInfo.Length / 1MB, 2)) MB" -ForegroundColor Cyan

    - name: Upload Education ZIP as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ECTOFORM-Education-Windows.zip
        path: ECTOFORM-Education-Windows.zip
        retention-days: 30

    - name: Education build summary
      run: |
        echo "## Build Summary (Education)" >> $env:GITHUB_STEP_SUMMARY
        echo "- ✅ Education EXE created successfully" >> $env:GITHUB_STEP_SUMMARY
        echo "- ✅ Education ZIP distribution created" >> $env:GITHUB_STEP_SUMMARY
        echo "- ✅ Education build completed on Windows" >> $env:GITHUB_STEP_SUMMARY
